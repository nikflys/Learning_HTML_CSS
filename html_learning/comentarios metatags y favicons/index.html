<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de venta de fruta </title> <!--(estos ultimos 2 van en el head)-->
    <link rel="icon" href="../imagenes/Boca.png" type="image/png">
    <meta name="description" content="Esta pagina web se trata de blablabla y de blablabla.">
    <meta name="keywords" content="frutas,fruta,banana,manzana,1kg de papa">
    <meta name="author" content="Lionel Messi">
    <!-- robots: le dice a los bots de los buscadores qué hacer con la página
         index = que la indexen (aparezca en Google)
         noindex = que NO la indexen
         follow = que sigan los links de la página
         nofollow = que NO sigan los links -->
    <meta name="robots" content="index, follow">

    <!-- og: = Open Graph, protocolo de Facebook/Meta para controlar cómo se ve
         la página cuando alguien la comparte en redes sociales (título, descripción, imagen) -->
    <meta name="og:title" content="Venta de frutas">
    <meta name="og:description" content="Esta pagina web se trata de blablabla y de blablabla.">
    <meta name="og:image" content="../imagenes/Boca.png">

    <!-- metatags.io es una página que sirve para ver cómo se ven las metatags en distintas redes sociales -->


</head>
<body>
    <!-- Comentario en HTML, favicons en el logito q aparece arriba de una pagina -->

</body>
</html>

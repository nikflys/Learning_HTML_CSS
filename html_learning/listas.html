<!DOCTYPE html>
<html>
    <head>
        <title>Listas</title>
    </head>
    <body>
        <!-- ul = unordered list, lista sin orden (muestra bullets por defecto)
             ol = ordered list, lista numerada, se usa cuando el orden importa (ej: pasos de una receta)
             li = list item, cada elemento de la lista -->
        <ul>
            <li>Elemento 1</li>
            <li>Elemento 2</li>
            <li>Elemento 3</li>
            <li>Elemento 4</li>
            <li>Elemento 5</li>
        </ul>

        <!-- tambien se pueden anidar listas dentro de otras listas -->
    </body>
</html>

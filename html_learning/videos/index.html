<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Videos</title>
</head>
<body>
    <!-- Ejemplo de cómo incrustar un video en HTML:

    <video controls loop autoplay muted src="video.mp4">
        controls:  muestra los controles del reproductor (play, pausa, volumen, etc.)
        loop:      el video se repite al terminar
        autoplay:  empieza solo al cargar la página (ojo: la mayoría de navegadores
                   lo bloquean si no tiene muted también)
        muted:     arranca sin sonido (necesario para que autoplay funcione en la mayoría de casos)

        <track src="captions.vtt" kind="subtitles" srclang="es" label="Español (Latinoamérica)" default>
            track: agrega subtítulos o closed captions al video
            kind="subtitles": indica que son subtítulos
            srclang: idioma del archivo de subtítulos
            default: activa esta pista por defecto

        Tu navegador no soporta el video.
        (Este texto solo se ve si el navegador no soporta la etiqueta video, que hoy en día casi no pasa)
    </video> -->

</body>
</html>

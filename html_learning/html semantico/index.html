<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <!-- HTML semántico: usar las etiquetas correctas según lo que representan,
         no solo divs para todo. Sirve para SEO, accesibilidad y mantenibilidad. -->
    <title>Semantica</title>
</head>
    <body>
        <!-- header: encabezado de la página, típicamente tiene el logo y la navegación -->
        <header>
            <!-- nav: bloque de navegación, contiene los links principales del sitio -->
            <nav>
                <ul>
                    <li><a href="#">XD</a></li>
                    <li><a href="#">XD</a></li>
                    <li><a href="#">XD</a></li>
                    <li><a href="#">XD</a></li>
                    <li><a href="#">XD</a></li>
                </ul>
            </nav>
        </header>

        <!-- main: contenido principal de la página, solo debe haber uno por página -->
        <main>
            <!-- section: agrupa contenido relacionado, tipo "sección temática" -->
            <section class="notice-container">

            </section>
        </main>

        <!-- aside: contenido secundario o complementario (barras laterales, widgets, etc.) -->
        <aside>
            <section class="comments-container">

            </section>
        </aside>

        <!-- footer: pie de página, típicamente tiene info de copyright, links secundarios, etc. -->
        <footer>
            <p>Copyright @ 2025 - Protegido por derechos de autor</p>
        </footer>
    </body>
</html>
